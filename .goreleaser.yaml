version: 2

project_name: rc

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: rc
    main: ./cmd/rc
    binary: rc
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: rc
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE*
      - AGENTS.md

homebrew_casks:
  - name: rc
    repository:
      owner: chmouel
      name: homebrew-tap
      branch: main
      # Pushing to a separate tap repository needs a token with write access to
      # it; the default GITHUB_TOKEN cannot. Provide it as the
      # GH_PERSO_TOKEN repository secret (see release.yml).
      token: "{{ .Env.GH_PERSO_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/chmouel/rc"
    description: "Workstation orchestrator: sync repos and YADM, manage dotfiles, run backups, updates, and diagnostics"
    license: MIT
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    # Remove the quarantine flag so the unsigned binary runs on macOS.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/rc"]
          end

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

release:
  github:
    owner: chmouel
    name: rc
  draft: false
  prerelease: auto
